name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: getTag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push LOS Lender Portal
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/bluepineapple-tal/los-lender-portal:${{ steps.getTag.outputs.tag }}

      - name: Debug Secrets
        run: |
          echo "PORTAINER_USER length: ${#PORTAINER_USER}"
          echo "PORTAINER_PASSWORD length: ${#PORTAINER_PASSWORD}"
        env:
          PORTAINER_USER: ${{ secrets.PORTAINER_USER }}
          PORTAINER_PASSWORD: ${{ secrets.PORTAINER_PASSWORD }}

      - name: Portainer - Login
        id: portainer_login
        run: |
          JSON_PAYLOAD=$(jq -n --arg user "${{ secrets.PORTAINER_USER }}" --arg pass "${{ secrets.PORTAINER_PASSWORD }}" \
            '{Username: $user, Password: $pass}')

          echo "Sending Payload: $JSON_PAYLOAD"

          curl -s --ipv4 -X POST \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" \
            https://portainer.middle-earth.in/api/auth \
            -o response.json

          echo "Portainer API Response:"
          cat response.json

          # Extract token only if response contains "jwt"
          if grep -q '"jwt"' response.json; then
            TOKEN=$(cat response.json | jq -r .jwt)
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
          else
            echo "Error: Portainer authentication failed. Response:"
            cat response.json
            exit 1
          fi

      - name: Portainer - Redeploy Staging
        if: github.ref_name == 'develop'
        run: |
          curl -i -X POST \
            -H "Authorization: Bearer ${{ steps.portainer_login.outputs.token }}" \
            "https://portainer.middle-earth.in/api/stacks/2/redeploy?endpointId=1"

      - name: Portainer - Redeploy Production
        if: github.ref_name == 'main'
        run: |
          curl -i -X POST \
            -H "Authorization: Bearer ${{ steps.portainer_login.outputs.token }}" \
            "https://portainer.middle-earth.in/api/stacks/3/redeploy?endpointId=1"
